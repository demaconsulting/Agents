---
on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string

jobs:

  # Performs quality checks including markdown linting and spell checking.
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run linters
        shell: pwsh
        run: ./lint.ps1

  # Builds the supporting documentation including build notes and user guide.
  build-docs:
    name: Build Documents
    runs-on: ubuntu-latest
    needs: quality-checks
    permissions:
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Install npm dependencies
        run: npm install

      - name: Restore Tools
        run: dotnet tool restore

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Capture tool versions
        run: >
          dotnet versionmark --capture --job-id "build-docs"
          --output "artifacts/versionmark-build-docs.json" --
          dotnet git node npm pandoc weasyprint buildmark versionmark

      - name: Create documents output directory
        run: mkdir -p docs/generated

      # === COMPILE BUILD NOTES ===

      - name: Create build notes output directory
        run: mkdir -p docs/build_notes/generated

      - name: Run BuildMark self-validation
        run: >
          dotnet buildmark
          --validate
          --results artifacts/buildmark-self-validation.trx

      - name: Run VersionMark self-validation
        run: >
          dotnet versionmark
          --validate
          --results artifacts/versionmark-self-validation.trx

      - name: Generate Build Notes with BuildMark
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          dotnet buildmark
          --build-version ${{ inputs.version }}
          --report docs/build_notes/generated/build_notes.md
          --report-depth 1

      - name: Publish Tool Versions
        run: >
          dotnet versionmark
          --publish
          --report docs/build_notes/generated/versions.md
          --report-depth 1
          -- "artifacts/**/versionmark-*.json"

      - name: Generate Build Notes HTML with Pandoc
        run: >
          dotnet pandoc
          --defaults docs/build_notes/definition.yaml
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/build_notes/generated/build_notes.html

      - name: Generate Build Notes PDF with WeasyPrint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/build_notes/generated/build_notes.html
          "docs/generated/DEMA Agents Build Notes.pdf"

      - name: Copy Build Notes report to docs/generated
        run: cp docs/build_notes/generated/build_notes.md docs/generated/build_notes.md

      # === COMPILE USER GUIDE ===

      - name: Create user guide output directory
        run: mkdir -p docs/user_guide/generated

      - name: Generate User Guide HTML with Pandoc
        run: >
          dotnet pandoc
          --defaults docs/user_guide/definition.yaml
          --metadata version="${{ inputs.version }}"
          --metadata date="$(date +'%Y-%m-%d')"
          --output docs/user_guide/generated/user_guide.html

      - name: Generate User Guide PDF with WeasyPrint
        run: >
          dotnet weasyprint
          --pdf-variant pdf/a-3u
          docs/user_guide/generated/user_guide.html
          "docs/generated/DEMA Agents User Guide.pdf"

      # === UPLOAD ARTIFACTS ===

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documents
          path: docs/generated/*

      - name: Upload agents
        uses: actions/upload-artifact@v4
        with:
          name: agents
          path: src/**/*
