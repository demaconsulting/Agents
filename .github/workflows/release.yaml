---
name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        type: string
      publish:
        description: 'Publish type'
        required: true
        type: choice
        options:
          - none
          - release

jobs:

  # Calls the reusable build workflow to lint and generate documentation
  # for the release version.
  build:
    name: Build
    permissions:
      contents: read
    uses: ./.github/workflows/build.yaml
    with:
      version: ${{ inputs.version }}

  # Packages the distributable src/ contents and publishes the GitHub release.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:

      - name: Download documents artifact
        uses: actions/download-artifact@v4
        with:
          name: documents
          path: artifacts

      - name: Download agents artifact
        uses: actions/download-artifact@v4
        with:
          name: agents
          path: agents

      - name: Create agents zip
        run: |
          cd agents
          zip -r "../artifacts/agents-${{ inputs.version }}.zip" .

      - name: Create GitHub Release
        if: inputs.publish == 'release'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.version }}
          artifacts: artifacts/*
          bodyFile: artifacts/build_notes.md
          generateReleaseNotes: false
