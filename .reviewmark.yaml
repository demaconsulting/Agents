---
# ReviewMark Configuration File
#
# <!-- TEMPLATE-DIRECTIVE:
#      Replace all {system-name}, {subsystem-name}, {unit-name}, {ots-name}, {package-name}
#      placeholders with your actual system's names (kebab-case).
#      Update the evidence-source URL to point to your repository's reviews branch.
#      Add or remove review-sets to match your software structure. -->

# Files needing review
needs-review:
  - README.md
  - docs/user_guide/**/*.md
  - '**/*.cs'  # remove if not a C# project
  - '**/*.cpp'  # remove if not a C++ project
  - '**/*.hpp'  # remove if not a C++ project
  - requirements.yaml
  - docs/reqstream/**/*.yaml
  - docs/design/**/*.md
  - docs/verification/**/*.md
  - '!**/obj/**'
  - '!**/bin/**'
  - '!**/generated/**'

# Source of review evidence
evidence-source:
  # <!-- TEMPLATE-DIRECTIVE:
  #      Update to type 'url' or 'fileshare' once formal reviews begin. -->
  type: none

# Context included for all reviews.
context:
  - docs/design/introduction.md

# Reviews
reviews:
  # Purpose Review (only one per repository)
  - id: Purpose
    title: Review that README and User Guide are Coherent and Complete
    context:
      - '!docs/design/introduction.md'
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = user-facing docs evaluated for coherence and completeness -->
      - README.md
      - docs/user_guide/**/*.md

  # Decomposition Review (only one per repository)
  - id: Decomposition
    title: Review that {SystemName} Decomposition Addresses the Stated Purpose
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = user promise that the decomposition must address -->
      - README.md
      - docs/user_guide/**/*.md
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = structural decomposition under evaluation -->
      - requirements.yaml
      - docs/design/introduction.md

  # {SystemName}-Architecture Review (one per system)
  - id: SystemName-Architecture
    title: Review that {SystemName} Architecture Satisfies Requirements
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = README and user_guide drive user intent into the system architecture -->
      - README.md
      - docs/user_guide/**/*.md
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = system specification under evaluation -->
      - docs/reqstream/system-name.yaml
      - docs/design/introduction.md
      - docs/design/system-name.md
      - docs/verification/introduction.md
      - docs/verification/system-name.md
      - test/**/SystemNameTests.cs

  # {SystemName}-Design Review (one per system)
  - id: SystemName-Design
    title: Review that {SystemName} Design is Consistent and Complete
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = trusted system requirements anchoring design completeness -->
      - docs/reqstream/system-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = system design under evaluation -->
      - docs/reqstream/system-name/platform-requirements.yaml
      - docs/design/introduction.md
      - docs/design/system-name.md
      - docs/design/system-name/**/*.md
      - docs/design/ots.md  # remove if no OTS items
      - docs/design/shared.md  # remove if no Shared Package items

  # {SystemName}-Verification Review (one per system)
  - id: SystemName-Verification
    title: Review that {SystemName} Verification is Consistent and Complete
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = trusted system requirements anchoring verification coverage -->
      - docs/reqstream/system-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = system verification under evaluation -->
      - docs/verification/introduction.md
      - docs/verification/system-name.md
      - docs/verification/system-name/**/*.md
      - docs/verification/ots.md  # remove if no OTS items
      - docs/verification/shared.md  # remove if no Shared Package items

  # {SystemName}-AllRequirements Review (one per system)
  - id: SystemName-AllRequirements
    title: Review that All {SystemName} Requirements are Complete
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = trusted baseline for sub-requirement decomposition -->
      - docs/design/system-name.md
      - docs/reqstream/system-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = sub-requirements under evaluation -->
      - docs/reqstream/system-name/**/*.yaml

  # {SystemName}-{UnitName} Review (one per unit directly under a system — no subsystem level)
  - id: SystemName-UnitName
    title: Review that {SystemName} {UnitName} Implementation is Correct
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = upstream obligations anchoring this unit -->
      - docs/design/system-name.md
      - docs/reqstream/system-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = unit artifacts under evaluation -->
      - docs/reqstream/system-name/unit-name.yaml
      - docs/design/system-name/unit-name.md
      - docs/verification/system-name/unit-name.md
      - src/**/UnitName.cs
      # <!-- TEMPLATE-DIRECTIVE:
      #      Add test file if applicable:
      #      - "test/**/UnitNameTests.cs" -->

  # {SystemName}-{SubsystemName} Review (one per subsystem)
  - id: SystemName-SubsystemName
    title: Review that {SystemName} {SubsystemName} Satisfies Subsystem Requirements
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = upstream obligations anchoring this subsystem -->
      - docs/design/system-name.md
      - docs/reqstream/system-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = subsystem artifacts under evaluation -->
      - docs/reqstream/system-name/subsystem-name.yaml
      - docs/design/system-name/subsystem-name.md
      - docs/verification/system-name/subsystem-name.md
      - test/**/SubsystemName/SubsystemNameTests.cs

  # {SystemName}-{SubsystemName}-{UnitName} Review (one per unit under a subsystem)
  - id: SystemName-SubsystemName-UnitName
    title: Review that {SystemName} {SubsystemName} {UnitName} Implementation is Correct
    context:
      # <!-- TEMPLATE-DIRECTIVE: context = upstream obligations anchoring this unit -->
      - docs/design/system-name.md
      - docs/reqstream/system-name.yaml
      - docs/design/system-name/subsystem-name.md
      - docs/reqstream/system-name/subsystem-name.yaml
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = unit artifacts under evaluation -->
      - docs/reqstream/system-name/subsystem-name/unit-name.yaml
      - docs/design/system-name/subsystem-name/unit-name.md
      - docs/verification/system-name/subsystem-name/unit-name.md
      - src/**/SubsystemName/UnitName.cs
      - test/**/SubsystemName/UnitNameTests.cs

  # OTS-{OtsName} Review (one per OTS item)
  - id: OTS-OtsName
    title: Review that {OtsName} Provides Required Functionality
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = OTS integration artifacts under evaluation -->
      - docs/reqstream/ots/ots-name.yaml
      - docs/design/ots/ots-name.md
      - docs/verification/ots/ots-name.md
      # <!-- TEMPLATE-DIRECTIVE:
      #      Add OTS test file if applicable:
      #      - "test/OtsSoftwareTests/{OtsName}Tests.cs" -->

  # Shared-{PackageName} Review (one per Shared Package)
  - id: Shared-PackageName
    title: Review that {PackageName} Provides Required Features
    paths:
      # <!-- TEMPLATE-DIRECTIVE: paths = Shared Package artifacts under evaluation -->
      - docs/reqstream/shared/package-name.yaml
      - docs/design/shared/package-name.md
      - docs/verification/shared/package-name.md
